version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: techfield-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: techfield-api:latest
    container_name: techfield-api
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
